<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinguaQuest - Learn Chinese, Japanese, Korean & Thai</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="251741" async data-cfasync="false"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222240;
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #ff9600;
            --accent: #1cb0f6;
            --accent2: #ce82ff;
            --danger: #ff4b4b;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --gold: #ffc800;
            --heart: #ff4b4b;
            --crown: #ffc800;
            --chinese: #ff6b6b;
            --japanese: #ff8c42;
            --korean: #4ecdc4;
            --thai: #7c5ce0;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font-main: 'Segoe UI', 'Noto Sans', 'Noto Sans CJK', 'Noto Sans Thai', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        /* Background animated particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
        /* Main container */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: var(--shadow);
            border-radius: 0;
        }
        @media (min-width: 501px) {
            .app-container {
                margin: 10px auto;
                border-radius: 28px;
                min-height: auto;
                height: 95vh;
                height: 95dvh;
                overflow: hidden;
            }
        }

        /* Header */
        .header {
            padding: 16px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: var(--surface);
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-icons {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .icon-btn {
            background: var(--surface2);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background: var(--primary);
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gold);
        }
        .streak-badge span {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        /* Scrollable main content */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .main-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }

        /* Language selector tabs */
        .lang-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .lang-tabs::-webkit-scrollbar {
            display: none;
        }
        .lang-tab {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 25px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            white-space: nowrap;
            background: var(--surface2);
            color: var(--text2);
            position: relative;
            overflow: hidden;
        }
        .lang-tab.active {
            color: #fff;
            border-color: var(--primary);
            background: #1a3a10;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.3);
            transform: translateY(-2px);
        }
        .lang-tab.chinese.active {
            border-color: var(--chinese);
            background: #2a1515;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        .lang-tab.japanese.active {
            border-color: var(--japanese);
            background: #2a1a10;
            box-shadow: 0 0 20px rgba(255, 140, 66, 0.3);
        }
        .lang-tab.korean.active {
            border-color: var(--korean);
            background: #0f1f1e;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }
        .lang-tab.thai.active {
            border-color: var(--thai);
            background: #1a1530;
            box-shadow: 0 0 20px rgba(124, 92, 224, 0.3);
        }
        .lang-tab:active {
            transform: scale(0.95);
        }
        .lang-emoji {
            margin-right: 4px;
        }

        /* Search bar */
        .search-wrap {
            position: relative;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 30px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(28, 176, 246, 0.2);
            background: #1e1e38;
        }
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            pointer-events: none;
        }
        .clear-search {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            padding: 6px;
        }
        .clear-search.visible {
            display: block;
        }

        /* Category chips */
        .section-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }
        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface2);
            border: 1.5px solid transparent;
            color: var(--text2);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chip:hover,
        .chip.active {
            background: var(--primary-dark);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(88, 204, 2, 0.25);
            transform: translateY(-2px);
        }
        .chip:active {
            transform: scale(0.93);
        }

        /* Word card */
        .word-card {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .word-card:active {
            transform: scale(0.97);
            background: #2a2a48;
        }
        .word-card.saved {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.2);
        }
        .word-card .word-main {
            font-size: 1.5rem;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
        }
        .word-card .word-info {
            flex: 1;
            min-width: 0;
        }
        .word-card .word-roman {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 3px;
        }
        .word-card .word-meaning {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.3;
        }
        .word-card .word-category-tag {
            font-size: 0.65rem;
            background: var(--surface);
            padding: 3px 8px;
            border-radius: 10px;
            color: var(--text2);
            margin-top: 4px;
            display: inline-block;
        }
        .word-card .save-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            padding: 6px;
            border-radius: 50%;
            color: var(--text2);
        }
        .word-card .save-btn:hover {
            color: var(--gold);
            transform: scale(1.2);
        }
        .word-card .save-btn.saved-active {
            color: var(--gold);
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn {
            0% {
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 70px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            animation: cardAppear 0.6s ease-out forwards;
        }
        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text2);
            margin-top: 2px;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 10px 10px 20px;
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        @media (min-width: 501px) {
            .bottom-nav {
                padding-bottom: 12px;
            }
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text2);
            transition: all 0.3s;
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.7rem;
            background: none;
            border: none;
        }
        .nav-item.active {
            color: var(--primary);
            background: rgba(88, 204, 2, 0.1);
        }
        .nav-item .nav-icon {
            font-size: 1.4rem;
            transition: all 0.3s;
        }
        .nav-item.active .nav-icon {
            transform: translateY(-4px);
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: bounceIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        @keyframes bounceIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            60% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal .big-word {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .modal .detail-row {
            margin: 6px 0;
            font-size: 0.95rem;
            color: var(--text2);
        }
        .modal .btn-close {
            margin-top: 16px;
            padding: 12px 30px;
            border-radius: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .modal .btn-close:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Quiz styles */
        .quiz-container {
            text-align: center;
            padding: 10px 0;
        }
        .quiz-word {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 16px 0;
            animation: bounceIn 0.6s ease-out;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }
        .quiz-option {
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
            text-align: left;
        }
        .quiz-option:active {
            transform: scale(0.96);
        }
        .quiz-option.correct {
            background: #1a4a1a;
            border-color: #58cc02;
            animation: correctPulse 0.6s ease-out;
        }
        .quiz-option.wrong {
            background: #4a1a1a;
            border-color: #ff4b4b;
            animation: shake 0.5s ease-out;
        }
        @keyframes correctPulse {
            0%,
            100% {
                box-shadow: 0 0 0 rgba(88, 204, 2, 0);
            }
            50% {
                box-shadow: 0 0 40px rgba(88, 204, 2, 0.7);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }
        .quiz-score {
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: 10px;
            color: var(--gold);
        }
        .quiz-streak {
            font-size: 0.85rem;
            color: var(--accent);
            animation: pulse 1s infinite;
        }

        /* XP animation */
        .xp-pop {
            position: fixed;
            z-index: 300;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--gold);
            animation: xpFly 1.5s ease-out forwards;
        }
        @keyframes xpFly {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.8);
            }
        }

        /* Duolingo-style character */
        .mascot {
            position: relative;
            display: inline-block;
            font-size: 4rem;
            animation: mascotBounce 2s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes mascotBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-25px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-10px);
            }
        }
        .mascot:active {
            animation: mascotSpin 0.6s ease-out;
        }
        @keyframes mascotSpin {
            0% {
                transform: rotate(0) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.3);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
        .mascot-speech {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mascot:hover .mascot-speech,
        .mascot:active .mascot-speech {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .word-card .word-main {
                font-size: 1.2rem;
                min-width: 45px;
            }
            .lang-tab {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            .quiz-word {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <!-- Header -->
        <div class="header">
            <div class="logo">🌍 LinguaQuest</div>
            <div class="header-icons">
                <div class="streak-badge">🔥 <span id="streakCount">7</span></div>
                <button class="icon-btn" id="btnSaved" title="Saved Words">
                    📚<span class="badge" id="savedBadge">0</span>
                </button>
            </div>
        </div>

        <!-- Scrollable main -->
        <div class="main-scroll" id="mainScroll">
            <!-- Mascot -->
            <div style="text-align:center;padding:5px 0;">
                <div class="mascot" id="mascot" title="Tap me!">
                    🦉
                    <span class="mascot-speech" id="mascotSpeech">Let's learn! ✨</span>
                </div>
            </div>

            <!-- Language Tabs -->
            <div class="lang-tabs" id="langTabs">
                <button class="lang-tab chinese active" data-lang="chinese">
                    <span class="lang-emoji">🇨🇳</span> 中文 Chinese
                </button>
                <button class="lang-tab japanese" data-lang="japanese">
                    <span class="lang-emoji">🇯🇵</span> 日本語 Japanese
                </button>
                <button class="lang-tab korean" data-lang="korean">
                    <span class="lang-emoji">🇰🇷</span> 한국어 Korean
                </button>
                <button class="lang-tab thai" data-lang="thai">
                    <span class="lang-emoji">🇹🇭</span> ไทย Thai
                </button>
            </div>

            <!-- Search -->
            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput"
                placeholder="🔍 Search words, romanization, or meaning...">
                <button class="clear-search" id="clearSearch">✕</button>
                <span class="search-icon">🔍</span>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Words</div></div>
                <div class="stat-card"><div class="stat-num" id="statLearned">0</div><div class="stat-label">Learned</div></div>
                <div class="stat-card"><div class="stat-num" id="statXP">0</div><div class="stat-label">XP Points</div></div>
                <div class="stat-card"><div class="stat-num" id="statCats">0</div><div class="stat-label">Categories</div></div>
            </div>

            <!-- Categories -->

    // ==================== JAVASCRIPT CODE ====================
    let currentLang = 'chinese';
    let allWords = [];
    let savedWords = [];
    let currentCategory = null;

    function initApp() {
        renderLanguageTabs();
        loadLanguage('chinese');
        setupEventListeners();
        generateParticles();
    }

    function renderLanguageTabs() {
        const container = document.getElementById('langTabs');
        container.innerHTML = '';
        Object.keys(DICTIONARY).forEach(lang => {
            const langData = DICTIONARY[lang];
            const button = document.createElement('button');
            button.className = `lang-tab ${langData.color} ${lang === 'chinese' ? 'active' : ''}`;
            button.setAttribute('data-lang', lang);
            button.innerHTML = `<span class="lang-emoji">${langData.flag}</span> ${langData.nativeName} ${langData.name}`;
            button.addEventListener('click', () => switchLanguage(lang));
            container.appendChild(button);
        });
    }

    function switchLanguage(lang) {
        currentLang = lang;
        currentCategory = null;
        document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
        loadLanguage(lang);
    }

    function loadLanguage(lang) {
        const langData = DICTIONARY[lang];
        allWords = [];
        Object.keys(langData.categories).forEach(catKey => {
            allWords.push(...langData.categories[catKey].words.map(w => ({...w, category: langData.categories[catKey].name})));
        });
        renderCategories();
        renderWords(allWords);
        updateStats();
    }

    function renderCategories() {
        const langData = DICTIONARY[currentLang];
        const container = document.getElementById('categoryChips');
        container.innerHTML = '';
        Object.keys(langData.categories).forEach(catKey => {
            const cat = langData.categories[catKey];
            const chip = document.createElement('button');
            chip.className = 'chip';
            chip.innerHTML = `${cat.icon} ${cat.name}`;
            chip.addEventListener('click', () => filterByCategory(catKey, chip));
            container.appendChild(chip);
        });
    }

    function filterByCategory(catKey, chip) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if (currentCategory === catKey) {
            currentCategory = null;
            renderWords(allWords);
        } else {
            currentCategory = catKey;
            chip.classList.add('active');
            const langData = DICTIONARY[currentLang];
            const categoryWords = langData.categories[catKey].words.map(w => ({...w, category: langData.categories[catKey].name}));
            renderWords(categoryWords);
        }
    }

    function renderWords(words) {
        const container = document.getElementById('wordList');
        const empty = document.getElementById('emptyState');
        container.innerHTML = '';
        
        if (words.length === 0) {
            empty.style.display = 'block';
            document.getElementById('resultCount').textContent = '';
            return;
        }
        empty.style.display = 'none';
        document.getElementById('resultCount').textContent = `(${words.length})`;
        
        words.forEach((w, idx) => {
            const card = document.createElement('div');
            card.className = `word-card ${savedWords.some(s => s.word === w.word) ? 'saved' : ''}`;
            card.innerHTML = `
                <div class="word-main">${w.word}</div>
                <div class="word-info">
                    <div class="word-roman">${w.roman}</div>
                    <div class="word-meaning">${w.meaning}</div>
                    <div class="word-category-tag">${w.category}</div>
                </div>
                <button class="save-btn ${savedWords.some(s => s.word === w.word) ? 'saved-active' : ''}" data-idx="${idx}">☆</button>
            `;
            card.addEventListener('click', () => showWordModal(w));
            card.querySelector('.save-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSave(w, card.querySelector('.save-btn'));
            });
            container.appendChild(card);
        });
    }

    function toggleSave(word, btn) {
        const idx = savedWords.findIndex(s => s.word === word.word);
        if (idx >= 0) {
            savedWords.splice(idx, 1);
            btn.classList.remove('saved-active');
            btn.textContent = '☆';
        } else {
            savedWords.push(word);
            btn.classList.add('saved-active');
            btn.textContent = '★';
        }
        updateStats();
    }

    function showWordModal(word) {
        const modal = document.getElementById('wordModal');
        modal.innerHTML = `
            <div class="big-word">${word.word}</div>
            <div class="detail-row"><strong>Romanization:</strong> ${word.roman}</div>
            <div class="detail-row"><strong>Meaning:</strong> ${word.meaning}</div>
            <div class="detail-row"><strong>Example:</strong> ${word.example}</div>
            <button class="btn-close">Close</button>
        `;
        modal.querySelector('.btn-close').addEventListener('click', () => {
            document.getElementById('modalOverlay').style.display = 'none';
        });
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function updateStats() {
        document.getElementById('statTotal').textContent = allWords.length;
        document.getElementById('statLearned').textContent = savedWords.length;
        document.getElementById('statXP').textContent = savedWords.length * 10;
        document.getElementById('statCats').textContent = Object.keys(DICTIONARY[currentLang].categories).length;
        document.getElementById('savedBadge').textContent = savedWords.length;
    }

    function setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.getElementById('clearSearch').classList.toggle('visible', query.length > 0);
            if (query) {
                const results = allWords.filter(w => w.word.toLowerCase().includes(query) || w.meaning.toLowerCase().includes(query) || w.roman.toLowerCase().includes(query));
                renderWords(results);
            } else {
                renderWords(currentCategory ? Object.values(DICTIONARY[currentLang].categories)[0].words : allWords);
            }
        });

        document.getElementById('clearSearch').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.remove('visible');
            renderWords(allWords);
        });

        document.getElementById('mascot').addEventListener('click', () => {
            const messages = ["Keep going! 🚀", "You're awesome! 💪", "Let's learn! ✨", "Keep practicing! 📚"];
            document.getElementById('mascotSpeech').textContent = messages[Math.floor(Math.random() * messages.length)];
        });
    }

    function generateParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = ['#58cc02', '#1cb0f6', '#ff9600', '#ce82ff'][Math.floor(Math.random() * 4)];
            particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(particle);
        }
    }

    initApp();
</script>
