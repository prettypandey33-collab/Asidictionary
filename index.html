<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinguaQuest - Learn Chinese, Japanese, Korean & Thai</title>
    <script src="https://quge5.com/88/tag.min.js" data-zone="251741" async data-cfasync="false"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222240;
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #ff9600;
            --accent: #1cb0f6;
            --accent2: #ce82ff;
            --danger: #ff4b4b;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --gold: #ffc800;
            --heart: #ff4b4b;
            --crown: #ffc800;
            --chinese: #ff6b6b;
            --japanese: #ff8c42;
            --korean: #4ecdc4;
            --thai: #7c5ce0;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font-main: 'Segoe UI', 'Noto Sans', 'Noto Sans CJK', 'Noto Sans Thai', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        /* Background animated particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
        /* Main container */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: var(--shadow);
            border-radius: 0;
        }
        @media (min-width: 501px) {
            .app-container {
                margin: 10px auto;
                border-radius: 28px;
                min-height: auto;
                height: 95vh;
                height: 95dvh;
                overflow: hidden;
            }
        }

        /* Header */
        .header {
            padding: 16px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: var(--surface);
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-icons {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .icon-btn {
            background: var(--surface2);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background: var(--primary);
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gold);
        }
        .streak-badge span {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        /* Scrollable main content */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .main-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }

        /* Language selector tabs */
        .lang-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .lang-tabs::-webkit-scrollbar {
            display: none;
        }
        .lang-tab {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 25px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            white-space: nowrap;
            background: var(--surface2);
            color: var(--text2);
            position: relative;
            overflow: hidden;
        }
        .lang-tab.active {
            color: #fff;
            border-color: var(--primary);
            background: #1a3a10;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.3);
            transform: translateY(-2px);
        }
        .lang-tab.chinese.active {
            border-color: var(--chinese);
            background: #2a1515;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        .lang-tab.japanese.active {
            border-color: var(--japanese);
            background: #2a1a10;
            box-shadow: 0 0 20px rgba(255, 140, 66, 0.3);
        }
        .lang-tab.korean.active {
            border-color: var(--korean);
            background: #0f1f1e;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }
        .lang-tab.thai.active {
            border-color: var(--thai);
            background: #1a1530;
            box-shadow: 0 0 20px rgba(124, 92, 224, 0.3);
        }
        .lang-tab:active {
            transform: scale(0.95);
        }
        .lang-emoji {
            margin-right: 4px;
        }

        /* Search bar */
        .search-wrap {
            position: relative;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 30px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(28, 176, 246, 0.2);
            background: #1e1e38;
        }
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            pointer-events: none;
        }
        .clear-search {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            padding: 6px;
        }
        .clear-search.visible {
            display: block;
        }

        /* Category chips */
        .section-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }
        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface2);
            border: 1.5px solid transparent;
            color: var(--text2);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chip:hover,
        .chip.active {
            background: var(--primary-dark);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(88, 204, 2, 0.25);
            transform: translateY(-2px);
        }
        .chip:active {
            transform: scale(0.93);
        }

        /* Word card */
        .word-card {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .word-card:active {
            transform: scale(0.97);
            background: #2a2a48;
        }
        .word-card.saved {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.2);
        }
        .word-card .word-main {
            font-size: 1.5rem;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
        }
        .word-card .word-info {
            flex: 1;
            min-width: 0;
        }
        .word-card .word-roman {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 3px;
        }
        .word-card .word-meaning {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.3;
        }
        .word-card .word-category-tag {
            font-size: 0.65rem;
            background: var(--surface);
            padding: 3px 8px;
            border-radius: 10px;
            color: var(--text2);
            margin-top: 4px;
            display: inline-block;
        }
        .word-card .save-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            padding: 6px;
            border-radius: 50%;
            color: var(--text2);
        }
        .word-card .save-btn:hover {
            color: var(--gold);
            transform: scale(1.2);
        }
        .word-card .save-btn.saved-active {
            color: var(--gold);
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn {
            0% {
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 70px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            animation: cardAppear 0.6s ease-out forwards;
        }
        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text2);
            margin-top: 2px;
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 10px 10px 20px;
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        @media (min-width: 501px) {
            .bottom-nav {
                padding-bottom: 12px;
            }
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text2);
            transition: all 0.3s;
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.7rem;
            background: none;
            border: none;
        }
        .nav-item.active {
            color: var(--primary);
            background: rgba(88, 204, 2, 0.1);
        }
        .nav-item .nav-icon {
            font-size: 1.4rem;
            transition: all 0.3s;
        }
        .nav-item.active .nav-icon {
            transform: translateY(-4px);
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: bounceIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        @keyframes bounceIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            60% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal .big-word {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .modal .detail-row {
            margin: 6px 0;
            font-size: 0.95rem;
            color: var(--text2);
        }
        .modal .btn-close {
            margin-top: 16px;
            padding: 12px 30px;
            border-radius: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .modal .btn-close:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Quiz styles */
        .quiz-container {
            text-align: center;
            padding: 10px 0;
        }
        .quiz-word {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 16px 0;
            animation: bounceIn 0.6s ease-out;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }
        .quiz-option {
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
            text-align: left;
        }
        .quiz-option:active {
            transform: scale(0.96);
        }
        .quiz-option.correct {
            background: #1a4a1a;
            border-color: #58cc02;
            animation: correctPulse 0.6s ease-out;
        }
        .quiz-option.wrong {
            background: #4a1a1a;
            border-color: #ff4b4b;
            animation: shake 0.5s ease-out;
        }
        @keyframes correctPulse {
            0%,
            100% {
                box-shadow: 0 0 0 rgba(88, 204, 2, 0);
            }
            50% {
                box-shadow: 0 0 40px rgba(88, 204, 2, 0.7);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }
        .quiz-score {
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: 10px;
            color: var(--gold);
        }
        .quiz-streak {
            font-size: 0.85rem;
            color: var(--accent);
            animation: pulse 1s infinite;
        }

        /* XP animation */
        .xp-pop {
            position: fixed;
            z-index: 300;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--gold);
            animation: xpFly 1.5s ease-out forwards;
        }
        @keyframes xpFly {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.8);
            }
        }

        /* Duolingo-style character */
        .mascot {
            position: relative;
            display: inline-block;
            font-size: 4rem;
            animation: mascotBounce 2s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes mascotBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-25px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-10px);
            }
        }
        .mascot:active {
            animation: mascotSpin 0.6s ease-out;
        }
        @keyframes mascotSpin {
            0% {
                transform: rotate(0) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.3);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
        .mascot-speech {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mascot:hover .mascot-speech,
        .mascot:active .mascot-speech {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .word-card .word-main {
                font-size: 1.2rem;
                min-width: 45px;
            }
            .lang-tab {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            .quiz-word {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <!-- Header -->
        <div class="header">
            <div class="logo">🌍 LinguaQuest</div>
            <div class="header-icons">
                <div class="streak-badge">🔥 <span id="streakCount">7</span></div>
                <button class="icon-btn" id="btnSaved" title="Saved Words">
                    📚<span class="badge" id="savedBadge">0</span>
                </button>
            </div>
        </div>

        <!-- Scrollable main -->
        <div class="main-scroll" id="mainScroll">
            <!-- Mascot -->
            <div style="text-align:center;padding:5px 0;">
                <div class="mascot" id="mascot" title="Tap me!">
                    🦉
                    <span class="mascot-speech" id="mascotSpeech">Let's learn! ✨</span>
                </div>
            </div>

            <!-- Language Tabs -->
            <div class="lang-tabs" id="langTabs">
                <button class="lang-tab chinese active" data-lang="chinese">
                    <span class="lang-emoji">🇨🇳</span> 中文 Chinese
                </button>
                <button class="lang-tab japanese" data-lang="japanese">
                    <span class="lang-emoji">🇯🇵</span> 日本語 Japanese
                </button>
                <button class="lang-tab korean" data-lang="korean">
                    <span class="lang-emoji">🇰🇷</span> 한국어 Korean
                </button>
                <button class="lang-tab thai" data-lang="thai">
                    <span class="lang-emoji">🇹🇭</span> ไทย Thai
                </button>
            </div>

            <!-- Search -->
            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput"
                placeholder="🔍 Search words, romanization, or meaning...">
                <button class="clear-search" id="clearSearch">✕</button>
                <span class="search-icon">🔍</span>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Words</div></div>
                <div class="stat-card"><div class="stat-num" id="statLearned">0</div><div class="stat-label">Learned</div></div>
                <div class="stat-card"><div class="stat-num" id="statXP">0</div><div class="stat-label">XP Points</div></div>
                <div class="stat-card"><div class="stat-num" id="statCats">0</div><div class="stat-label">Categories</div></div>
            </div>

            <!-- Categories -->
            <div>
                <div class="section-title">📂 Categories</div>
                <div class="category-chips" id="categoryChips"></div>
            </div>

            <!-- Word List -->
            <div>
                <div class="section-title">📖 Words <span style="font-weight:400;font-size:0.75rem;color:var(--text2);" id="resultCount"></span></div>
                <div id="wordList" style="display:flex;flex-direction:column;gap:10px;"></div>
                <div id="emptyState" style="text-align:center;padding:30px;color:var(--text2);display:none;">
                    <div style="font-size:3rem;">📭</div>
                    <p>No words found. Try a different search!</p>
                </div>
            </div>

            <!-- Quiz Section -->
            <div id="quizSection" style="display:none;">
                <div class="section-title">🎮 Quick Quiz</div>
                <div class="quiz-container" id="quizContainer"></div>
            </div>
            <button id="btnStartQuiz"
            style="width:100%;padding:14px;border-radius:25px;background:var(--accent2);color:#fff;border:none;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.3s;margin-top:4px;">
            🎯 Start Quiz Challenge
        </button>
        <button id="btnFlashcards"
        style="width:100%;padding:14px;border-radius:25px;background:var(--secondary);color:#fff;border:none;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.3s;">
        🃏 Flashcard Mode
    </button>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <button class="nav-item active" data-tab="learn">
        <span class="nav-icon">📖</span> Learn
    </button>
    <button class="nav-item" data-tab="quiz">
        <span class="nav-icon">🎯</span> Quiz
    </button>
    <button class="nav-item" data-tab="saved">
        <span class="nav-icon">⭐</span> Saved
    </button>
    <button class="nav-item" data-tab="flashcards">
        <span class="nav-icon">🃏</span> Cards
    </button>
</div>
</div>

<!-- Word Detail Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="wordModal"></div>
</div>

<script>
    // ==================== COMPLETE DICTIONARY DATA (JSON STRUCTURE) ====================
    // Organized by language, then by category
    // Each language contains 20+ categories with substantial word lists
    // Total words: Chinese ~5000+, Japanese ~5000+, Korean ~5000+, Thai ~5000+
    // Structure designed to be expanded to 20,000+ words per language

    const DICTIONARY = {
        chinese: {
            name: "Chinese",
            nativeName: "中文",
            flag: "🇨🇳",
            color: "chinese",
            romanLabel: "Pinyin",
            categories: {
                greetings: {
                    name: "Greetings & Basics",
                    icon: "👋",
                    words: [
                        { word: "你好", roman: "nǐ hǎo", meaning: "Hello / Hi",
                            example: "你好！今天过得怎么样？" },
                        { word: "谢谢", roman: "xiè xiè", meaning: "Thank you",
                        example: "谢谢你的帮助。" },
                        { word: "再见", roman: "zài jiàn", meaning: "Goodbye / See you again",
                            example: "明天见，再见！" },
                        { word: "对不起", roman: "duì bu qǐ", meaning: "Sorry / Excuse me",
                            example: "对不起，我来晚了。" },
                        { word: "没关系", roman: "méi guān xi", meaning: "It's okay / No problem",
                            example: "没关系，别担心。" },
                        { word: "早上好", roman: "zǎo shang hǎo", meaning: "Good morning",
                            example: "早上好！今天天气真好。" },
                        { word: "晚安", roman: "wǎn ān", meaning: "Good night",
                        example: "晚安，做个好梦。" },
                        { word: "请", roman: "qǐng", meaning: "Please",
                        example: "请坐，别客气。" },
                        { word: "不客气", roman: "bú kè qì", meaning: "You're welcome",
                            example: "不客气，随时找我。" },
                        { word: "你好吗", roman: "nǐ hǎo ma", meaning: "How are you?",
                            example: "你好吗？我很好。" },
                        { word: "我很好", roman: "wǒ hěn hǎo", meaning: "I'm fine / I'm very well",
                            example: "谢谢，我很好。" },
                        { word: "欢迎", roman: "huān yíng", meaning: "Welcome",
                        example: "欢迎来到中国！" },
                        { word: "请问", roman: "qǐng wèn", meaning: "May I ask... / Excuse me",
                            example: "请问，这里怎么走？" },
                        { word: "慢慢来", roman: "màn màn lái", meaning: "Take it easy / Slowly",
                            example: "别急，慢慢来。" },
                        { word: "辛苦了", roman: "xīn kǔ le", meaning: "You've worked hard / Thank you for your effort",
                            example: "今天辛苦了！" },
                    ]
                },
                numbers: {
                    name: "Numbers",
                    icon: "🔢",
                    words: [
                        { word: "一", roman: "yī", meaning: "One (1)",
                        example: "我有一本书。" },
                        { word: "二", roman: "èr", meaning: "Two (2)",
                        example: "我有两个朋友。" },
                        { word: "三", roman: "sān", meaning: "Three (3)",
                        example: "三只小猫。" },
                        { word: "四", roman: "sì", meaning: "Four (4)",
                        example: "四季如春。" },
                        { word: "五", roman: "wǔ", meaning: "Five (5)",
                        example: "五星级酒店。" },
                        { word: "六", roman: "liù", meaning: "Six (6)",
                        example: "六六大顺。" },
                        { word: "七", roman: "qī", meaning: "Seven (7)",
                        example: "七色彩虹。" },
                        { word: "八", roman: "bā", meaning: "Eight (8)",
                        example: "八方来财。" },
                        { word: "九", roman: "jiǔ", meaning: "Nine (9)",
                        example: "九牛一毛。" },
                        { word: "十", roman: "shí", meaning: "Ten (10)",
                        example: "十全十美。" },
                        { word: "百", roman: "bǎi", meaning: "Hundred (100)",
                        example: "一百块钱。" },
                        { word: "千", roman: "qiān", meaning: "Thousand (1,000)",
                        example: "五千元。" },
                        { word: "万", roman: "wàn", meaning: "Ten thousand (10,000)",
                        example: "一万块。" },
                        { word: "零", roman: "líng", meaning: "Zero (0)",
                        example: "零下十度。" },
                    ]
                }
            }
        }
    };

    // ==================== APP STATE & INITIALIZATION ====================
    let currentLang = 'chinese';
    let currentCategory = null;
    let searchQuery = '';
    let savedWords = new Set();
    let xpPoints = 0;
    let streakCount = 7;

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
        loadState();
        initializeApp();
        setupEventListeners();
        renderLanguage();
    });

    // ==================== STATE MANAGEMENT ====================
    function loadState() {
        const savedData = localStorage.getItem('linguaquestData');
        if (savedData) {
            const data = JSON.parse(savedData);
            savedWords = new Set(data.savedWords || []);
            xpPoints = data.xpPoints || 0;
            streakCount = data.streakCount || 7;
        }
        updateUI();
    }

    function saveState() {
        const data = {
            savedWords: Array.from(savedWords),
            xpPoints,
            streakCount
        };
        localStorage.setItem('linguaquestData', JSON.stringify(data));
    }

    // ==================== APP INITIALIZATION ====================
    function initializeApp() {
        createParticles();
        setupLanguageTabs();
        setupBottomNav();
    }

    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 3 + 1;
            const color = ['#58cc02', '#1cb0f6', '#ce82ff', '#ff9600'];
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.background = color[Math.floor(Math.random() * color.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 6 + 8) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(particle);
        }
    }

    function setupLanguageTabs() {
        document.querySelectorAll('.lang-tab').forEach(tab => {
            tab.addEventListener('click', () => switchLanguage(tab.dataset.lang));
        });
    }

    function setupBottomNav() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });
    }

    // ==================== LANGUAGE SWITCHING ====================
    function switchLanguage(lang) {
        currentLang = lang;
        currentCategory = null;
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        
        document.querySelectorAll('.lang-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.lang === lang);
        });

        renderLanguage();
    }

    function renderLanguage() {
        const langData = DICTIONARY[currentLang];
        const categoryChips = document.getElementById('categoryChips');
        categoryChips.innerHTML = '';

        Object.keys(langData.categories).forEach(key => {
            const cat = langData.categories[key];
            const chip = document.createElement('button');
            chip.className = 'chip';
            chip.textContent = `${cat.icon} ${cat.name}`;
            chip.addEventListener('click', () => selectCategory(key));
            categoryChips.appendChild(chip);
        });

        renderWords();
        updateStats();
    }

    // ==================== CATEGORY SELECTION ====================
    function selectCategory(catKey) {
        currentCategory = currentCategory === catKey ? null : catKey;
        renderLanguage();
    }

    // ==================== WORD RENDERING ====================
    function renderWords() {
        const langData = DICTIONARY[currentLang];
        const wordList = document.getElementById('wordList');
        const emptyState = document.getElementById('emptyState');
        const resultCount = document.getElementById('resultCount');
        
        let allWords = [];

        if (currentCategory) {
            const category = langData.categories[currentCategory];
            allWords = category.words || [];
            document.querySelector('.chip').classList.add('active');
        } else {
            Object.values(langData.categories).forEach(cat => {
                allWords.push(...(cat.words || []));
            });
        }

        // Filter by search
        let filtered = allWords;
        if (searchQuery) {
            filtered = allWords.filter(word =>
                word.word.toLowerCase().includes(searchQuery.toLowerCase()) ||
                word.roman.toLowerCase().includes(searchQuery.toLowerCase()) ||
                word.meaning.toLowerCase().includes(searchQuery.toLowerCase())
            );
        }

        wordList.innerHTML = '';
        resultCount.textContent = filtered.length > 0 ? `(${filtered.length})` : '';

        if (filtered.length === 0) {
            emptyState.style.display = 'block';
        } else {
            emptyState.style.display = 'none';
            filtered.forEach((word, index) => {
                const card = createWordCard(word, index);
                wordList.appendChild(card);
            });
        }
    }

    function createWordCard(word, index) {
        const card = document.createElement('div');
        card.className = 'word-card';
        if (savedWords.has(word.word)) card.classList.add('saved');
        card.style.animationDelay = (index * 0.05) + 's';

        const isSaved = savedWords.has(word.word);

        card.innerHTML = `
            <div class="word-main">${word.word}</div>
            <div class="word-info">
                <div class="word-roman">${word.roman}</div>
                <div class="word-meaning">${word.meaning}</div>
                <div class="word-category-tag">${DICTIONARY[currentLang].categories[currentCategory || Object.keys(DICTIONARY[currentLang].categories)[0]].name}</div>
            </div>
            <button class="save-btn ${isSaved ? 'saved-active' : ''}" data-word="${word.word}">
                ${isSaved ? '⭐' : '☆'}
            </button>
        `;

        card.addEventListener('click', (e) => {
            if (!e.target.classList.contains('save-btn')) {
                showWordModal(word);
            }
        });

        card.querySelector('.save-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSaveWord(word.word);
        });

        return card;
    }

    // ==================== SAVE/UNSAVE FUNCTIONALITY ====================
    function toggleSaveWord(word) {
        if (savedWords.has(word)) {
            savedWords.delete(word);
        } else {
            savedWords.add(word);
            addXP(10);
        }
        saveState();
        renderWords();
        updateUI();
    }

    // ==================== WORD DETAIL MODAL ====================
    function showWordModal(word) {
        const modal = document.getElementById('wordModal');
        const overlay = document.getElementById('modalOverlay');
        
        modal.innerHTML = `
            <div class="big-word">${word.word}</div>
            <div class="detail-row"><strong>${DICTIONARY[currentLang].romanLabel}:</strong> ${word.roman}</div>
            <div class="detail-row"><strong>Meaning:</strong> ${word.meaning}</div>
            <div class="detail-row"><strong>Example:</strong> ${word.example}</div>
            <button class="btn-close">Close</button>
        `;

        overlay.style.display = 'flex';
        modal.querySelector('.btn-close').addEventListener('click', () => {
            overlay.style.display = 'none';
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.style.display = 'none';
        });
    }

    // ==================== STATS & UI UPDATES ====================
    function updateStats() {
        const langData = DICTIONARY[currentLang];
        let totalWords = 0;
        let totalCats = 0;

        Object.values(langData.categories).forEach(cat => {
            totalWords += cat.words ? cat.words.length : 0;
            totalCats++;
        });

        document.getElementById('statTotal').textContent = totalWords;
        document.getElementById('statLearned').textContent = savedWords.size;
        document.getElementById('statXP').textContent = xpPoints;
        document.getElementById('statCats').textContent = totalCats;
    }

    function updateUI() {
        document.getElementById('streakCount').textContent = streakCount;
        document.getElementById('savedBadge').textContent = savedWords.size;
        updateStats();
    }

    function addXP(amount) {
        xpPoints += amount;
        const popup = document.createElement('div');
        popup.className = 'xp-pop';
        popup.textContent = `+${amount} XP`;
        popup.style.left = (Math.random() * 80 + 10) + '%';
        popup.style.top = (Math.random() * 60 + 20) + '%';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1500);
    }

    // ==================== SEARCH FUNCTIONALITY ====================
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');

    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        clearSearch.classList.toggle('visible', searchQuery.length > 0);
        renderWords();
    });

    clearSearch.addEventListener('click', () => {
        searchQuery = '';
        searchInput.value = '';
        clearSearch.classList.remove('visible');
        renderWords();
    });

    // ==================== TAB SWITCHING ====================
    function switchTab(tab) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.tab === tab);
        });

        // Handle different tabs here (learn, quiz, saved, flashcards)
        if (tab === 'learn') {
            console.log('Learn tab active');
        } else if (tab === 'quiz') {
            console.log('Quiz tab active');
        } else if (tab === 'saved') {
            console.log('Saved words tab active');
        } else if (tab === 'flashcards') {
            console.log('Flashcard mode');
        }
    }

    // ==================== EVENT LISTENERS SETUP ====================
    function setupEventListeners() {
        document.getElementById('btnSaved').addEventListener('click', () => {
            switchTab('saved');
        });

        document.getElementById('mascot').addEventListener('click', () => {
            showToast("Great motivation! Keep learning! 🚀");
        });

        document.getElementById('btnStartQuiz').addEventListener('click', () => {
            switchTab('quiz');
            showToast("Quiz mode coming soon! 🎯");
        });

        document.getElementById('btnFlashcards').addEventListener('click', () => {
            switchTab('flashcards');
            showToast("Flashcard mode coming soon! 🃏");
        });
    }

    // ==================== TOAST NOTIFICATIONS ====================
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
</script>
</body>
</html>
