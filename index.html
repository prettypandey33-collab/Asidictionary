<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinguaQuest - Learn Chinese, Japanese, Korean & Thai</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222240;
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #ff9600;
            --accent: #1cb0f6;
            --accent2: #ce82ff;
            --danger: #ff4b4b;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --gold: #ffc800;
            --heart: #ff4b4b;
            --crown: #ffc800;
            --chinese: #ff6b6b;
            --japanese: #ff8c42;
            --korean: #4ecdc4;
            --thai: #7c5ce0;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font-main: 'Segoe UI', 'Noto Sans', 'Noto Sans CJK', 'Noto Sans Thai', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            5% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: var(--shadow);
            border-radius: 0;
        }
        @media (min-width: 501px) {
            .app-container {
                margin: 10px auto;
                border-radius: 28px;
                min-height: auto;
                height: 95vh;
                height: 95dvh;
                overflow: hidden;
            }
        }

        .header {
            padding: 16px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: var(--surface);
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-icons {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .icon-btn {
            background: var(--surface2);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background: var(--primary);
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: #fff;
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gold);
        }
        .streak-badge span {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .main-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }

        .lang-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .lang-tabs::-webkit-scrollbar {
            display: none;
        }
        .lang-tab {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 25px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            white-space: nowrap;
            background: var(--surface2);
            color: var(--text2);
            position: relative;
            overflow: hidden;
        }
        .lang-tab.active {
            color: #fff;
            border-color: var(--primary);
            background: #1a3a10;
            box-shadow: 0 0 20px rgba(88, 204, 2, 0.3);
            transform: translateY(-2px);
        }
        .lang-tab.chinese.active {
            border-color: var(--chinese);
            background: #2a1515;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        .lang-tab.japanese.active {
            border-color: var(--japanese);
            background: #2a1a10;
            box-shadow: 0 0 20px rgba(255, 140, 66, 0.3);
        }
        .lang-tab.korean.active {
            border-color: var(--korean);
            background: #0f1f1e;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }
        .lang-tab.thai.active {
            border-color: var(--thai);
            background: #1a1530;
            box-shadow: 0 0 20px rgba(124, 92, 224, 0.3);
        }
        .lang-tab:active {
            transform: scale(0.95);
        }
        .lang-emoji {
            margin-right: 4px;
        }

        .search-wrap {
            position: relative;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: 30px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(28, 176, 246, 0.2);
            background: #1e1e38;
        }
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            pointer-events: none;
        }
        .clear-search {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            padding: 6px;
        }
        .clear-search.visible {
            display: block;
        }

        .section-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }
        .category-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface2);
            border: 1.5px solid transparent;
            color: var(--text2);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chip:hover,
        .chip.active {
            background: var(--primary-dark);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(88, 204, 2, 0.25);
            transform: translateY(-2px);
        }
        .chip:active {
            transform: scale(0.93);
        }

        .word-card {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .word-card:active {
            transform: scale(0.97);
            background: #2a2a48;
        }
        .word-card.saved {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.2);
        }
        .word-card .word-main {
            font-size: 1.5rem;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
        }
        .word-card .word-info {
            flex: 1;
            min-width: 0;
        }
        .word-card .word-roman {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 3px;
        }
        .word-card .word-meaning {
            font-size: 0.85rem;
            color: var(--text2);
            line-height: 1.3;
        }
        .word-card .word-category-tag {
            font-size: 0.65rem;
            background: var(--surface);
            padding: 3px 8px;
            border-radius: 10px;
            color: var(--text2);
            margin-top: 4px;
            display: inline-block;
        }
        .word-card .save-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            padding: 6px;
            border-radius: 50%;
            color: var(--text2);
        }
        .word-card .save-btn:hover {
            color: var(--gold);
            transform: scale(1.2);
        }
        .word-card .save-btn.saved-active {
            color: var(--gold);
            animation: popIn 0.5s ease-out;
        }
        @keyframes popIn {
            0% {
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.5);
            }
            100% {
                transform: scale(1);
            }
        }

        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 70px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            animation: cardAppear 0.6s ease-out forwards;
        }
        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #58cc02, #1cb0f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text2);
            margin-top: 2px;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 10px 10px 20px;
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        @media (min-width: 501px) {
            .bottom-nav {
                padding-bottom: 12px;
            }
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text2);
            transition: all 0.3s;
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.7rem;
            background: none;
            border: none;
        }
        .nav-item.active {
            color: var(--primary);
            background: rgba(88, 204, 2, 0.1);
        }
        .nav-item .nav-icon {
            font-size: 1.4rem;
            transition: all 0.3s;
        }
        .nav-item.active .nav-icon {
            transform: translateY(-4px);
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: bounceIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        @keyframes bounceIn {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            60% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal .big-word {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .modal .detail-row {
            margin: 6px 0;
            font-size: 0.95rem;
            color: var(--text2);
        }
        .modal .btn-close {
            margin-top: 16px;
            padding: 12px 30px;
            border-radius: 25px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .modal .btn-close:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }

        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .quiz-container {
            text-align: center;
            padding: 10px 0;
        }
        .quiz-word {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 16px 0;
            animation: bounceIn 0.6s ease-out;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }
        .quiz-option {
            padding: 14px 20px;
            border-radius: 25px;
            border: 2px solid var(--surface2);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
            text-align: left;
        }
        .quiz-option:active {
            transform: scale(0.96);
        }
        .quiz-option.correct {
            background: #1a4a1a;
            border-color: #58cc02;
            animation: correctPulse 0.6s ease-out;
        }
        .quiz-option.wrong {
            background: #4a1a1a;
            border-color: #ff4b4b;
            animation: shake 0.5s ease-out;
        }
        @keyframes correctPulse {
            0%,
            100% {
                box-shadow: 0 0 0 rgba(88, 204, 2, 0);
            }
            50% {
                box-shadow: 0 0 40px rgba(88, 204, 2, 0.7);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }
        .quiz-score {
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: 10px;
            color: var(--gold);
        }
        .quiz-streak {
            font-size: 0.85rem;
            color: var(--accent);
            animation: pulse 1s infinite;
        }

        .xp-pop {
            position: fixed;
            z-index: 300;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--gold);
            animation: xpFly 1.5s ease-out forwards;
        }
        @keyframes xpFly {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.8);
            }
        }

        .mascot {
            position: relative;
            display: inline-block;
            font-size: 4rem;
            animation: mascotBounce 2s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes mascotBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-25px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-10px);
            }
        }
        .mascot:active {
            animation: mascotSpin 0.6s ease-out;
        }
        @keyframes mascotSpin {
            0% {
                transform: rotate(0) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.3);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
        .mascot-speech {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #333;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mascot:hover .mascot-speech,
        .mascot:active .mascot-speech {
            opacity: 1;
        }

        @media (max-width: 360px) {
            .word-card .word-main {
                font-size: 1.2rem;
                min-width: 45px;
            }
            .lang-tab {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            .quiz-word {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-particles" id="particles"></div>

    <div class="toast" id="toast"></div>

    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="logo">🌍 LinguaQuest</div>
            <div class="header-icons">
                <div class="streak-badge">🔥 <span id="streakCount">7</span></div>
                <button class="icon-btn" id="btnSaved" title="Saved Words">
                    📚<span class="badge" id="savedBadge">0</span>
                </button>
            </div>
        </div>

        <div class="main-scroll" id="mainScroll">
            <div style="text-align:center;padding:5px 0;">
                <div class="mascot" id="mascot" title="Tap me!">
                    🦉
                    <span class="mascot-speech" id="mascotSpeech">Let's learn! ✨</span>
                </div>
            </div>

            <div class="lang-tabs" id="langTabs">
                <button class="lang-tab chinese active" data-lang="chinese">
                    <span class="lang-emoji">🇨🇳</span> 中文 Chinese
                </button>
                <button class="lang-tab japanese" data-lang="japanese">
                    <span class="lang-emoji">🇯🇵</span> 日本語 Japanese
                </button>
                <button class="lang-tab korean" data-lang="korean">
                    <span class="lang-emoji">🇰🇷</span> 한국어 Korean
                </button>
                <button class="lang-tab thai" data-lang="thai">
                    <span class="lang-emoji">🇹🇭</span> ไทย Thai
                </button>
            </div>

            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput"
                placeholder="🔍 Search words, romanization, or meaning...">
                <button class="clear-search" id="clearSearch">✕</button>
                <span class="search-icon">🔍</span>
            </div>

            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Words</div></div>
                <div class="stat-card"><div class="stat-num" id="statLearned">0</div><div class="stat-label">Learned</div></div>
                <div class="stat-card"><div class="stat-num" id="statXP">0</div><div class="stat-label">XP Points</div></div>
                <div class="stat-card"><div class="stat-num" id="statCats">0</div><div class="stat-label">Categories</div></div>
            </div>

            <div>
                <div class="section-title">📂 Categories</div>
                <div class="category-chips" id="categoryChips"></div>
            </div>

            <div>
                <div class="section-title">📖 Words <span style="font-weight:400;font-size:0.75rem;color:var(--text2);" id="resultCount"></span></div>
                <div id="wordList" style="display:flex;flex-direction:column;gap:10px;"></div>
                <div id="emptyState" style="text-align:center;padding:30px;color:var(--text2);display:none;">
                    <div style="font-size:3rem;">📭</div>
                    <p>No words found. Try a different search!</p>
                </div>

    function getAllWords(lang) {
        const cats = DICTIONARY[lang].categories;
        let all = [];
        for (let catKey in cats) {
            cats[catKey].words.forEach(w => {
                all.push({ ...w, category: catKey, categoryName: cats[catKey].name,
                    categoryIcon: cats[catKey].icon });
            });
        }
        return all;
    }

    function getFilteredWords() {
        let words = getAllWords(currentLang);
        if (currentCategory !== 'all') {
            words = words.filter(w => w.category === currentCategory);
        }
        if (searchQuery.trim()) {
            const q = searchQuery.toLowerCase().trim();
            words = words.filter(w =>
                w.word.toLowerCase().includes(q) ||
                w.roman.toLowerCase().includes(q) ||
                w.meaning.toLowerCase().includes(q) ||
                w.categoryName.toLowerCase().includes(q) ||
                (w.example && w.example.toLowerCase().includes(q))
            );
        }
        return words;
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function spawnXP(x, y) {
        const el = document.createElement('div');
        el.className = 'xp-pop';
        el.textContent = '+10 XP ⚡';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function updateStats() {
        const words = getAllWords(currentLang);
        const cats = DICTIONARY[currentLang].categories;
        statTotal.textContent = words.length;
        statLearned.textContent = learnedWords.filter(lw => lw.lang === currentLang).length;
        statXP.textContent = xpPoints;
        statCats.textContent = Object.keys(cats).length;
        savedBadge.textContent = savedWords.length;
        streakCount.textContent = streakDays;
    }

    function renderCategoryChips() {
        const cats = DICTIONARY[currentLang].categories;
        let html = `<button class="chip ${currentCategory==='all'?'active':''}" data-cat="all">📋 All</button>`;
        for (let key in cats) {
            html +=
                `<button class="chip ${currentCategory===key?'active':''}" data-cat="${key}">${cats[key].icon} ${cats[key].name}</button>`;
        }
        categoryChips.innerHTML = html;

        categoryChips.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                currentCategory = chip.dataset.cat;
                renderCategoryChips();
                renderWordList();
                mainScroll.scrollTop = 0;
            });
        });
    }

    function renderWordList() {
        const words = getFilteredWords();
        if (words.length === 0) {
            wordList.innerHTML = '';
            emptyState.style.display = 'block';
            resultCount.textContent = '(0 words)';
        } else {
            emptyState.style.display = 'none';
            resultCount.textContent = `(${words.length} words)`;
            let html = '';
            words.forEach((w, i) => {
                const isSaved = savedWords.some(sw => sw.word === w.word && sw.lang === currentLang);
                const isLearned = learnedWords.some(lw => lw.word === w.word && lw.lang ===
                    currentLang);
                html += `
                <div class="word-card ${isSaved?'saved':''}" style="animation-delay:${i*0.03}s" data-word="${escapeHTML(w.word)}" data-cat="${w.category}">
                    <div class="word-main">${w.word}</div>
                    <div class="word-info">
                        <div class="word-roman">${w.roman}</div>
                        <div class="word-meaning">${w.meaning}</div>
                        <span class="word-category-tag">${w.categoryIcon} ${w.categoryName}</span>
                        ${isLearned ? ' <span style="font-size:0.6rem;color:#58cc02;">✓ Learned</span>' : ''}
                    </div>
                    <button class="save-btn ${isSaved?'saved-active':''}" data-word="${escapeHTML(w.word)}" data-lang="${currentLang}">
                        ${isSaved ? '⭐' : '☆'}
                    </button>
                </div>`;
            });
            wordList.innerHTML = html;

            wordList.querySelectorAll('.word-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.closest('.save-btn')) return;
                    const wordText = this.dataset.word;
                    const catKey = this.dataset.cat;
                    const cat = DICTIONARY[currentLang].categories[catKey];
                    let foundWord = null;
                    if (cat) {
                        foundWord = cat.words.find(w => w.word === wordText);
                    }
                    if (!foundWord) {
                        const allW = getAllWords(currentLang);
                        foundWord = allW.find(w => w.word === wordText);
                    }
                    if (foundWord) {
                        showWordModal(foundWord);
                        markLearned(foundWord);
                    }
                });
            });

            wordList.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const wordText = this.dataset.word;
                    const lang = this.dataset.lang;
                    const allW = getAllWords(lang);
                    const foundWord = allW.find(w => w.word === wordText);
                    if (foundWord) {
                        toggleSaveWord(foundWord, lang, this);
                    }
                });
            });
        }
        updateStats();
    }

    function markLearned(wordObj) {
        const exists = learnedWords.some(lw => lw.word === wordObj.word && lw.lang === currentLang);
        if (!exists) {
            learnedWords.push({ word: wordObj.word, roman: wordObj.roman, meaning: wordObj.meaning,
                lang: currentLang, date: Date.now() });
            localStorage.setItem('linguaquest_learned', JSON.stringify(learnedWords));
            xpPoints += 10;
            localStorage.setItem('linguaquest_xp', xpPoints);
            updateStats();
            renderWordList();
        }
    }

    function toggleSaveWord(wordObj, lang, btnEl) {
        const idx = savedWords.findIndex(sw => sw.word === wordObj.word && sw.lang === lang);
        if (idx >= 0) {
            savedWords.splice(idx, 1);
            if (btnEl) {
                btnEl.classList.remove('saved-active');
                btnEl.textContent = '☆';
            }
            showToast('🗑️ Removed from saved');
        } else {
            savedWords.push({ word: wordObj.word, roman: wordObj.roman, meaning: wordObj.meaning, lang,
                category: wordObj.category, date: Date.now() });
            if (btnEl) {
                btnEl.classList.add('saved-active');
                btnEl.textContent = '⭐';
                btnEl.style.animation = 'none';
                btnEl.offsetHeight;
                btnEl.style.animation = 'popIn 0.5s ease-out';
            }
            xpPoints += 5;
            localStorage.setItem('linguaquest_xp', xpPoints);
            showToast('⭐ Word saved! +5 XP');
        }
        localStorage.setItem('linguaquest_saved', JSON.stringify(savedWords));
        updateStats();
        if (currentView === 'saved') renderSavedView();
    }

            <button class="btn-close" id="btnCloseModal">Close ✕</button>
        `;

            modalOverlay.style.display = 'none';

    }

    function generateQuizQuestion() {
        const allWords = getAllWords(currentLang);
        if (allWords.length < 4) {
            quizContainer.innerHTML = '<p>Not enough words for quiz. Add more words!</p>';
            return;
        }
        const correctIdx = Math.floor(Math.random() * allWords.length);
        const correctWord = allWords[correctIdx];
        const wrongPool = allWords.filter((_, i) => i !== correctIdx);
        const wrongAnswers = [];
        const poolCopy = [...wrongPool];
        for (let i = 0; i < 3; i++) {
            const ri = Math.floor(Math.random() * poolCopy.length);
            wrongAnswers.push(poolCopy.splice(ri, 1)[0]);
        }
        const options = [
            { word: correctWord, isCorrect: true },
            ...wrongAnswers.map(w => ({ word: w, isCorrect: false }))
        ];
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        quizCurrentQ = { correctWord, options };
        const romanLabel = DICTIONARY[currentLang].romanLabel;
        quizContainer.innerHTML = `
            <div class="quiz-score">Score: ${quizScore} | Streak: ${quizStreak} 🔥</div>
            <div class="quiz-word">${correctWord.word}</div>
            <div style="color:var(--accent);">${correctWord.roman}</div>
            <div style="color:var(--text2);font-size:0.85rem;">What does this mean?</div>
            <div class="quiz-options">
                ${options.map((o,i) => `
                    <button class="quiz-option" data-index="${i}" data-correct="${o.isCorrect}">
                        ${o.word.meaning}
                    </button>
                `).join('')}
            </div>
        `;
        quizContainer.querySelectorAll('.quiz-option').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!quizActive) return;
                const isCorrect = this.dataset.correct === 'true';
                if (isCorrect) {
                    this.classList.add('correct');
                    quizScore += 10;
                    quizStreak++;
                    xpPoints += 15;
                    localStorage.setItem('linguaquest_xp', xpPoints);
                    showToast('✅ Correct! +15 XP');
                    markLearned(quizCurrentQ.correctWord);
                } else {
                    this.classList.add('wrong');
                    quizStreak = 0;
                    showToast('❌ Wrong! Try again');
                    quizContainer.querySelectorAll('.quiz-option').forEach(b => {
                        if (b.dataset.correct === 'true') b.classList.add(
                            'correct');
                    });
                }
                quizActive = false;
                quizContainer.querySelectorAll('.quiz-option').forEach(b => b.style
                    .pointerEvents = 'none');
                setTimeout(() => {
                    if (currentView === 'quiz') {
                        quizActive = true;
                        generateQuizQuestion();
                    }
                }, 1800);
            });
        });
        updateStats();
    }

    function renderFlashcardView() {
        currentView = 'flashcards';
        updateNavButtons();
        flashcardMode = true;
        const allWords = getAllWords(currentLang);
        flashcardWords = [...allWords].sort(() => Math.random() - 0.5);
        flashcardIndex = 0;
        quizSection.style.display = 'none';
        btnStartQuiz.style.display = 'none';
        btnFlashcards.style.display = 'none';
        wordList.innerHTML = '';
        emptyState.style.display = 'none';
        categoryChips.innerHTML = '';
        resultCount.textContent = `(${flashcardWords.length} cards)`;
        if (flashcardWords.length === 0) {
            quizContainer.innerHTML = '<p>No words available.</p>';
            return;
        }
        renderFlashcard();
    }

    function renderFlashcard() {
        if (flashcardIndex >= flashcardWords.length) {
            quizContainer.innerHTML = `
                <div style="text-align:center;padding:30px;">
                    <div style="font-size:4rem;">🎉</div>
                    <h3>All cards reviewed!</h3>
                    <p>You went through ${flashcardWords.length} cards.</p>
                    <button class="btn-close" onclick="exitFlashcards()">Done</button>
                </div>`;
            return;
        }
        const w = flashcardWords[flashcardIndex];
        const romanLabel = DICTIONARY[currentLang].romanLabel;
        quizContainer.innerHTML = `
            <div style="text-align:center;">
                <div style="font-size:0.8rem;color:var(--text2);">Card ${flashcardIndex+1} of ${flashcardWords.length}</div>
                <div class="quiz-word" style="font-size:3rem;">${w.word}</div>
                <div style="color:var(--accent);font-size:1.1rem;">${w.roman}</div>
                <div id="flashcardAnswer" style="margin-top:14px;font-size:1.3rem;font-weight:700;color:var(--gold);min-height:40px;transition:all 0.3s;opacity:0;">${w.meaning}</div>
                <div style="margin-top:8px;color:var(--text2);font-size:0.8rem;">${w.categoryIcon} ${w.categoryName}</div>
                <button id="btnReveal" style="margin-top:14px;padding:12px 28px;border-radius:25px;background:var(--accent);color:#fff;border:none;font-weight:700;cursor:pointer;font-size:1rem;">👆 Tap to Reveal</button>
                <div style="display:flex;gap:10px;justify-content:center;margin-top:12px;">
                    <button id="btnAgain" style="padding:10px 20px;border-radius:20px;background:var(--danger);color:#fff;border:none;cursor:pointer;display:none;">🔄 Again</button>
                    <button id="btnGood" style="padding:10px 20px;border-radius:20px;background:var(--primary);color:#fff;border:none;cursor:pointer;display:none;">✅ Got it!</button>
                </div>
            </div>
        `;
        const answerEl = $('#flashcardAnswer');
        const btnReveal = $('#btnReveal');
        const btnAgain = $('#btnAgain');
        const btnGood = $('#btnGood');

        btnReveal.addEventListener('click', () => {
            answerEl.style.opacity = '1';
            btnReveal.style.display = 'none';
            btnAgain.style.display = 'inline-block';
            btnGood.style.display = 'inline-block';
            markLearned(w);
        });
        btnAgain.addEventListener('click', () => {
            flashcardIndex++;
            renderFlashcard();
        });
        btnGood.addEventListener('click', () => {
            xpPoints += 10;
            localStorage.setItem('linguaquest_xp', xpPoints);
            showToast('✅ +10 XP');
            flashcardIndex++;
            updateStats();
            renderFlashcard();
        });
    }

    function exitFlashcards() {
        flashcardMode = false;
        currentView = 'learn';
        updateNavButtons();
        quizContainer.innerHTML = '';
        quizSection.style.display = 'none';
        btnStartQuiz.style.display = 'block';
        btnFlashcards.style.display = 'block';
        renderCategoryChips();
        renderWordList();
    }

    function updateNavButtons() {
        $$('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = $(`.nav-item[data-tab="${currentView}"]`);
        if (activeNav) activeNav.classList.add('active');
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    langTabs.addEventListener('click', function(e) {
        const tab = e.target.closest('.lang-tab');
        if (!tab) return;
        const lang = tab.dataset.lang;
        if (lang === currentLang && currentView === 'learn') return;
        currentLang = lang;
        currentCategory = 'all';
        searchQuery = '';
        searchInput.value = '';
        clearSearch.classList.remove('visible');
        currentView = 'learn';
        updateNavButtons();
        quizActive = false;
        flashcardMode = false;
        quizSection.style.display = 'none';
        quizContainer.innerHTML = '';
        btnStartQuiz.style.display = 'block';
        btnFlashcards.style.display = 'block';

        $$('.lang-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        renderCategoryChips();
        renderWordList();
        updateStats();
        mainScroll.scrollTop = 0;

        const mascotMessages = {
            chinese: ['你好！来学中文吧！', '加油！💪', '中文很有趣！', '学汉语很有意思！'],
            japanese: ['こんにちは！頑張って！', '日本語を勉強しよう！', 'すごい！', '楽しく学ぼう！'],
            korean: ['안녕! 파이팅!', '한국어 재미있어요!', '잘하고 있어요!', '힘내요!'],
            thai: ['สวัสดี! มาเรียนกัน!', 'สู้ๆ นะ!', 'ภาษาไทยสนุก!', 'เก่งมาก!']
        };
        const msgs = mascotMessages[lang] || ['Let\'s learn!'];
        mascotSpeech.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    });

    searchInput.addEventListener('input', function() {
        searchQuery = this.value;
        if (searchQuery.trim()) {
            clearSearch.classList.add('visible');
        } else {
            clearSearch.classList.remove('visible');
        }
        renderWordList();
    });
    clearSearch.addEventListener('click', function() {
        searchInput.value = '';
        searchQuery = '';
        clearSearch.classList.remove('visible');
        renderWordList();
        searchInput.focus();
    });

    $$('.nav-item').forEach(nav => {
        nav.addEventListener('click', function() {
            const tab = this.dataset.tab;
            quizActive = false;
            flashcardMode = false;
            quizSection.style.display = 'none';
            quizContainer.innerHTML = '';
            btnStartQuiz.style.display = 'block';
            btnFlashcards.style.display = 'block';

            if (tab === 'learn') {
                currentView = 'learn';
                updateNavButtons();
                renderCategoryChips();
                renderWordList();
            } else if (tab === 'quiz') {
                renderQuizView();
            } else if (tab === 'saved') {
                renderSavedView();
            } else if (tab === 'flashcards') {
                renderFlashcardView();
            }
            mainScroll.scrollTop = 0;
        });
    });

    btnStartQuiz.addEventListener('click', function() {
        renderQuizView();
        mainScroll.scrollTop = mainScroll.scrollHeight;
    });

    btnFlashcards.addEventListener('click', function() {
        renderFlashcardView();
        mainScroll.scrollTop = mainScroll.scrollHeight;
    });

    $('#btnSaved').addEventListener('click', function() {
        renderSavedView();
        mainScroll.scrollTop = 0;
    });

    $('#mascot').addEventListener('click', function() {
        const messages = [
            'Keep going! 🎯', 'You\'re doing great! ⭐', 'Practice makes perfect! 💪',
            'Learning is fun! 🌟', 'Ganbatte! 頑張って！', 'Fighting! 파이팅!',
            'Su su! สู้ๆ!', '加油！Jiā yóu!', 'Never give up! 🚀', 'You are amazing! ✨'
        ];
        mascotSpeech.textContent = messages[Math.floor(Math.random() * messages.length)];
        xpPoints += 1;
        localStorage.setItem('linguaquest_xp', xpPoints);
        updateStats();
        const rect = this.getBoundingClientRect();
        spawnXP(rect.left + rect.width / 2, rect.top);
    });

    function createParticles() {
        const container = $('#particles');
        const colors = ['#58cc02', '#1cb0f6', '#ce82ff', '#ff9600', '#ff4b4b', '#ffc800', '#4ecdc4',
            '#ff8c42'
        ];
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = (Math.random() * 6 + 2) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animationDuration = (Math.random() * 12 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(particle);
        }
    }

    function init() {
        createParticles();
        updateStats();
        renderCategoryChips();
        renderWordList();
        updateNavButtons();
        mascotSpeech.textContent = '你好！来学习吧！✨';

        const today = new Date().toDateString();
        const lastVisit = localStorage.getItem('linguaquest_lastVisit');
        if (lastVisit !== today) {
            if (lastVisit) {
                const lastDate = new Date(lastVisit);
                const diffDays = Math.floor((new Date() - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) {
                    streakDays++;
                } else if (diffDays > 1) {
                    streakDays = 1;
                }
            }
            localStorage.setItem('linguaquest_lastVisit', today);
            localStorage.setItem('linguaquest_streak', streakDays);
            updateStats();
        }

        console.log('🌍 LinguaQuest initialized!');
        console.log('📚 Languages:', Object.keys(DICTIONARY).map(l => DICTIONARY[l].name).join(', '));
        console.log('📖 Total word entries loaded across all languages and categories.');
        console.log('💡 500+ new Chinese words added across 25+ categories!');
        console.log('📱 Optimized for Android & mobile browsers.');
    }

    init();

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            modalOverlay.style.display = 'none';
            if (flashcardMode) exitFlashcards();
            if (currentView === 'quiz') {
                quizActive = false;
                currentView = 'learn';
                updateNavButtons();
                quizSection.style.display = 'none';
                quizContainer.innerHTML = '';
                btnStartQuiz.style.display = 'block';
                btnFlashcards.style.display = 'block';
                renderCategoryChips();
                renderWordList();
            }
        }
        if (e.ctrlKey && e.key === 'f') {
            e.preventDefault();
            searchInput.focus();
        }
    });

    console.log('✅ LinguaQuest Dictionary App Ready!');
    console.log('📊 Structure supports 20,000+ words per language.');
    console.log('🎯 Features: Search, Categories, Quiz, Flashcards, Save, XP, Streaks, Animations');
    console.log('🇨🇳 500+ new Chinese words added!');
</script>
</body>
</html>
